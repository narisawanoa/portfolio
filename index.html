  <style>
:root {
  --bg:#ffffff;
  --fg:#000000;
  --muted:#545454;
  --border:#e6e6e6;
}
* { box-sizing: border-box; }
body {
  margin:0;
  font-family: 'Fira Sans', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color:var(--fg);
  background:var(--bg);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}
main { flex:1; position: relative; }
header {
  position: relative;
  top: 0;
  z-index: 50;
  background: rgb(255, 255, 255);
  backdrop-filter: blur(8px);
  padding: 20px 30px;
  text-align: left;
}
.header-container {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.header-left { flex: 1; }
header h1 { margin: 0; font-size: 18px; font-weight: 300; }
.header-left-description {
  font-size: 12px;
  line-height: 1.6;
  margin-top: 5px;
  margin-bottom: 10px;
  max-width: 400px;
  color: #000;
}
.dolphin-image {
  height: 22px;
  width: auto;
  vertical-align: middle;
  margin-left: 3px;
}
header nav { margin-top: 15px; display: flex; gap: 30px; }
header nav a {
  color: var(--fg);
  text-decoration: none;
  padding-bottom: 5px;
  border-bottom: 2px solid transparent;
  transition: border-color 0.3s ease;
  font-size: 14px;
}
header nav a:hover, header nav a.active { border-bottom-color: transparent; }

/* ── FULL-PAGE THUMBNAIL GRID ── */
.works-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
}

.grid-item {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 4/3;
  background: #f0f0f0;
}

.grid-item img,
.grid-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease, opacity 0.3s ease;
}

.grid-item video { pointer-events: none; }

.grid-item:hover img,
.grid-item:hover video {
  transform: scale(1.04);
  opacity: 0.7;
}

.grid-item-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px 18px;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 55%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.grid-item:hover .grid-item-overlay { opacity: 1; }

.grid-item-title {
  font-size: 15px;
  font-weight: 300;
  color: #fff;
  line-height: 1.3;
  margin: 0 0 3px;
}

.grid-item-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  margin: 0;
}

/* upcoming banner */
.upcoming-section { margin-top: 0; padding: 18px 30px; border-top: 1px solid var(--border); }
.upcoming-title { font-size: 12px; font-weight: 400; margin-bottom: 6px; color: #000; }
.scrolling-banner {
  overflow: hidden;
  white-space: nowrap;
  font-size: 12px;
  color: #000;
  position: relative;
}
.banner-content {
  display: inline-block;
  animation: scroll-left 30s linear infinite;
}
@keyframes scroll-left {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ── PROJECT PAGE ── */
.project-page { display: none; }
.project-page.active { display: block; }

.project-header {
  max-width: 100%;
  padding: 40px 30px 20px;
  text-align: center;
}
.project-header h1 { font-size: 24px; font-weight: 400; margin: 0 0 20px; }
.project-meta { color: #000000; font-size: 16px; margin-bottom: 30px; }

.project-gallery { width: 100%; max-width: 100%; margin: 0; padding: 0; }
.project-gallery img {
  width: 100%; max-height: none; height: auto;
  object-fit: cover; display: block;
  margin: 0; padding: 0; border-radius: 0;
  cursor: pointer; transition: opacity 0.3s ease;
}
.project-gallery video {
  width: 100%; max-width: 100%; max-height: none; height: auto;
  display: block; margin: 0; padding: 0; border-radius: 0;
  cursor: default; transition: opacity 0.3s ease;
}
.project-gallery iframe {
  width: 100%; max-width: 100%; display: block;
  margin: 0; padding: 0; border-radius: 0; border: none;
  aspect-ratio: 16/9; height: auto;
}

.back-link {
  position: absolute; top: 20px; left: 30px;
  font-size: 16px; color: var(--fg); text-decoration: none;
  padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px;
  transition: background-color 0.3s ease; background: var(--bg); cursor: pointer; z-index: 10;
}
.back-link:hover { background-color: var(--border); }

/* all works list at bottom of project page */
.all-works-list {
  padding: 40px 30px;
  max-width: 700px;
}
.all-works-list h2 { font-size: 14px; font-weight: 400; color: var(--muted); margin: 0 0 20px; }
.all-works-list .title-item {
  font-size: 18px; font-weight: 300;
  padding: 8px 0; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: color 0.2s;
}
.all-works-list .title-item:hover { color: red; }

.cursor-coords {
  position: fixed; top: 35px; right: 10px; color: white;
  padding: 8px 12px; border-radius: 4px; font-size: 12px;
  font-family: monospace; z-index: 100; pointer-events: none;
}
.contact-link {
  position: fixed; top: 10px; right: 10px; color: white;
  padding: 8px 12px; border-radius: 4px; font-size: 12px;
  font-family: monospace; z-index: 10000; pointer-events: auto;
  text-decoration: none; transition: opacity 0.3s ease;
}
.contact-link:hover { opacity: 0.7; }
.header-center {
  position: fixed; top: 60px; right: 10px;
  font-size: 12px; line-height: 1.8; color: #000; z-index: 100; padding: 8px 12px;
}

.image-modal {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; background: rgba(0,0,0,0.9);
  z-index: 10000; justify-content: center; align-items: center; cursor: pointer;
}
.image-modal.active { display: flex; }
.image-modal img { max-width: 90%; max-height: 90%; object-fit: contain; }

footer { padding:20px; font-size:14px; text-align: center; }
footer p { margin:0; }

@media (max-width: 768px) {
  body { font-size: 12px; }
  header { padding: 15px; }
  header h1 { font-size: 16px; }
  .header-left-description { font-size: 10px; max-width: 100%; }
  .header-container { flex-direction: column; gap: 10px; }
  .header-center { position: static; padding: 0; font-size: 10px; margin-top: 6px; }
  .works-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-item-overlay { opacity: 1; }
  .grid-item-title { font-size: 12px; }
  .cursor-coords { display: none; }
  .contact-link { top: auto; bottom: 10px; right: 10px; font-size: 11px; }
  .project-header { padding: 30px 15px 15px; }
  .project-header h1 { font-size: 16px; }
  .back-link { top: 15px; left: 15px; font-size: 10px; padding: 6px 12px; }
  canvas { display: none !important; }
}

@media (max-width: 480px) {
  .works-grid { grid-template-columns: 1fr; }
}

const monthMap = {
  'January':1,'February':2,'March':3,'April':4,'May':5,'June':6,
  'July':7,'August':8,'September':9,'October':10,'November':11,'December':12
};

function getSortedKeys() {
  return Object.keys(projects).sort((a, b) => {
    const pa = projects[a], pb = projects[b];
    if (pb.year !== pa.year) return pb.year - pa.year;
    const matchA = pa.meta.match(/^(January|February|March|April|May|June|July|August|September|October|November|December)/);
    const matchB = pb.meta.match(/^(January|February|March|April|May|June|July|August|September|October|November|December)/);
    const monthA = (pa.monthOrder||0) + (matchA ? monthMap[matchA[1]]*10 : 0);
    const monthB = (pb.monthOrder||0) + (matchB ? monthMap[matchB[1]]*10 : 0);
    return monthB - monthA;
  });
}

function renderThumbMedia(item) {
  if (item.type === 'youtube') {
    return `<img src="https://img.youtube.com/vi/${item.src}/maxresdefault.jpg" alt="">`;
  } else if (item.type === 'video') {
    return `<video autoplay loop muted playsinline><source src="${item.src}" type="video/mp4"></video>`;
  } else {
    return `<img src="${item.src}" alt="">`;
  }
}

function showWorks() {
  const sorted = getSortedKeys();
  const gridHTML = sorted.map(key => {
    const p = projects[key];
    return `<div class="grid-item" onclick="showProject('${key}')">
      ${renderThumbMedia(p.thumb)}
      <div class="grid-item-overlay">
        <div class="grid-item-title">${p.title}</div>
        <div class="grid-item-meta">${p.meta.split('/')[0].trim()}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `

      </div>
    </div>`;
}

function showProject(key) {
  const p = projects[key];
  const mediaHTML = p.media.map(m => {
    if (m.type === 'youtube') {
      return `<iframe src="https://www.youtube.com/embed/${m.src}?rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
    } else if (m.type === 'link') {
      return `<div style="padding:40px 30px;"><a href="${m.src}" target="_blank" rel="noopener" style="font-size:16px;color:var(--fg);text-decoration:none;border-bottom:1px solid var(--fg);">${m.label}</a></div>`;
    } else if (m.type === 'video') {
      return `<video controls preload="metadata"><source src="${m.src}" type="video/mp4"><source src="${m.src}" type="video/quicktime">Your browser does not support the video tag.</video>`;
    } else {
      return `<img src="${m.src}" alt="" class="clickable-image">`;
    }
  }).join('');

  const allTitles = getSortedKeys().map(k =>
    `<div class="title-item" onclick="showProject('${k}')">${projects[k].title}</div>`
  ).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="project-page active">
      <a href="#works" class="back-link" onclick="showWorks(); return false;">← Works</a>
      <div class="project-header">
        <h1>${p.title}</h1>
        <div class="project-meta">${p.meta}</div>
      </div>
      <div class="project-gallery">${mediaHTML}</div>
      <div class="all-works-list">
        <h2>All works</h2>
        ${allTitles}
      </div>
    </div>`;

  document.querySelectorAll('.clickable-image').forEach(img => {
    img.addEventListener('click', function() {
      const modal = document.getElementById('image-modal');
      modal.querySelector('img').src = this.src;
      modal.classList.add('active');
    });
  });

  window.scrollTo(0, 0);
}

    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    showWorks();

});

document.addEventListener('mousemove', e => {
  const coordsEl = document.getElementById('coords');
  coordsEl.textContent = `X: ${e.clientX}, Y: ${e.clientY}`;
  const r = Math.round((e.clientX / window.innerWidth) * 255);
  const g = Math.round((e.clientY / window.innerHeight) * 255);
  const b = Math.round(255 - ((r + g) / 2));
  const colorValue = `rgb(${r},${g},${b})`;
  coordsEl.style.color = colorValue;
  const contactEl = document.getElementById('contact-link');
  if (contactEl) contactEl.style.color = colorValue;
  if (!isDrawing) { lastX = e.clientX; lastY = e.clientY; lastTime = Date.now(); isDrawing = true; return; }
  const currentTime = Date.now();
  const timeDelta = Math.max(currentTime - lastTime, 1);
  const distance = Math.hypot(e.clientX - lastX, e.clientY - lastY);
  const velocity = distance / timeDelta;
  const opacity = Math.max(0.2, Math.min(0.9, 0.9 - velocity * 0.3));
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(e.clientX, e.clientY);
  ctx.strokeStyle = `rgba(${r},${g},${b},${opacity})`; ctx.lineWidth = 2; ctx.stroke();
  lastX = e.clientX; lastY = e.clientY; lastTime = currentTime;
});

document.addEventListener('click', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); isDrawing = false; });
  </script>
</body>
</html>
