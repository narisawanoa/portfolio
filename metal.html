<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notes</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 2rem 1.5rem; }
    .form-body { display: none; }
    .form-body.visible { display: block; }
    .entry.editing .entry-view { display: none; }
    .entry-edit-form { display: none; }
    .entry.editing .entry-edit-form { display: block; }
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); }
    #lightbox.active { display: flex; align-items: center; justify-content: center; }
    #lightbox img { max-width: 90vw; max-height: 90vh; }
    .editor { border: 1px solid #ccc; padding: 0.5rem; }
    .block { margin: 0.25rem 0; display: flex; align-items: flex-start; gap: 0.5rem; }
    .block textarea { width: 100%; min-height: 120px; resize: vertical; font-family: 'Segoe UI', sans-serif; font-size: 1rem; }
    .block img { max-width: 400px; display: block; }
    .block video { max-width: 400px; display: block; }
    .block-controls { display: flex; flex-direction: column; gap: 2px; }
    .block-controls button { font-size: 0.7rem; cursor: pointer; }
    .entry-block-text { margin: 0.5rem 0; white-space: pre-wrap; line-height: 1.7; }
    .entry-block-img img { max-width: 400px; cursor: pointer; margin: 0.75rem 0; display: block; }
    .entry-block-video video { max-width: 400px; margin: 0.75rem 0; display: block; }
    #admin-bar { position: fixed; top: 1rem; right: 1rem; }
    #admin-btn { background: none; border: none; cursor: pointer; font-family: 'Segoe UI', sans-serif; font-size: 1.5rem; color: #aaa; padding: 0; }
    #admin-btn:hover { color: #000; }
    .admin-active #admin-btn { color: red; font-weight: bold; }
    #admin-status { display: none; }
    .admin-only { display: none; }
    .admin-active .admin-only { display: inline; }
    .entry { margin-bottom: 3rem; }
    .entry-date-label { font-size: 0.75rem; color: #888; margin-bottom: 0.4rem; }
    .entry-title { font-size: 1.5rem; font-weight: normal; margin: 0 0 0.75rem 0; }
    .entry-type-label { font-size: 0.75rem; color: #aaa; margin-bottom: 0.5rem; }
    .entry-admin-actions { margin-top: 0.5rem; font-size: 0.8rem; }
    #entry-count { color: #aaa; font-size: 0.8rem; margin-bottom: 2rem; }
    h1 { font-size: 1.8rem; font-weight: normal; margin-bottom: 0.25rem; }
  </style>
</head>
<body>

<h1>Notes</h1>
<p><a href="devlog.html">intro to computation</a> &nbsp; <strong>metal &amp; performance</strong></p>

<div id="admin-bar">
  <button id="admin-btn" onclick="toggleAdmin()">+</button>
</div>

<p id="entry-count"></p>

<div id="add-form" class="admin-only">
  <p><a href="#" onclick="toggleForm(); return false;">+ new entry</a></p>
  <div class="form-body" id="form-body">
    <p><label>Title<br><input type="text" id="f-title" style="width:100%" /></label></p>
    <p><label>Date<br><input type="date" id="f-date" /></label></p>
    <p><label>Type<br>
      <select id="f-type">
        <option value="devlog">devlog</option>
        <option value="vlog">vlog</option>
        <option value="note">note</option>
        <option value="experiment">experiment</option>
        <option value="process">process</option>
      </select>
    </label></p>
    <p>Content:</p>
    <div class="editor" id="editor"></div>
    <p>
      <button onclick="addTextBlock('editor')">+ text</button>
      <button onclick="triggerMediaInsert('editor')">+ image/video</button>
      <input type="file" id="media-insert-input" multiple accept="image/*,video/*" style="display:none" onchange="handleMediaInsert(this)" />
    </p>
    <p><button onclick="addEntry()">publish</button></p>
  </div>
</div>

<div id="entries"></div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="" />
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBYY6PZA1oR3OA7cMmVjOYc1QvBjyaIpYk",
    authDomain: "devlog-43b86.firebaseapp.com",
    projectId: "devlog-43b86",
    storageBucket: "devlog-43b86.firebasestorage.app",
    messagingSenderId: "490846315184",
    appId: "1:490846315184:web:f9662938bb9d354d369175"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const COL = "metal-performance";

  let entries = [];
  let isAdmin = false;
  let activeEditorId = null;

  const today = new Date().toISOString().split('T')[0];

  onAuthStateChanged(auth, user => {
    isAdmin = !!user;
    if (isAdmin) {
      document.body.classList.add('admin-active');
      document.getElementById('admin-btn').textContent = '×';
      document.getElementById('f-date').value = today;
      if (!document.getElementById('editor').children.length) addTextBlock('editor');
    } else {
      document.body.classList.remove('admin-active');
      document.getElementById('admin-btn').textContent = '+';
    }
  });

  window.toggleAdmin = async function() {
    if (isAdmin) { await signOut(auth); return; }
    const pw = prompt("Password:");
    if (!pw) return;
    try {
      await signInWithEmailAndPassword(auth, "narisawa.noa@gmail.com", pw);
    } catch(e) { alert("Wrong password."); }
  };

  async function loadEntries() {
    try {
      const q = query(collection(db, COL), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      entries = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
      renderAll();
    } catch(e) { console.error(e); }
  }

  loadEntries();

  window.addEntry = async function() {
    const title = document.getElementById('f-title').value.trim();
    const date  = document.getElementById('f-date').value;
    const type  = document.getElementById('f-type').value;
    const blocks = readEditorBlocks('editor');
    if (!title && blocks.length === 0) { alert('Add a title or content first.'); return; }
    const entry = { title: title || '(untitled)', date, type, blocks, createdAt: Date.now() };
    const docRef = await addDoc(collection(db, COL), entry);
    entries.unshift({ firestoreId: docRef.id, ...entry });
    renderAll();
    document.getElementById('f-title').value = '';
    document.getElementById('f-date').value = today;
    document.getElementById('f-type').value = 'devlog';
    document.getElementById('editor').innerHTML = '';
    addTextBlock('editor');
    document.getElementById('form-body').classList.remove('visible');
  };

  window.saveEdit = async function(firestoreId) {
    const idx = entries.findIndex(e => e.firestoreId === firestoreId);
    if (idx === -1) return;
    const updated = {
      title:  document.getElementById(`edit-title-${firestoreId}`).value.trim() || '(untitled)',
      date:   document.getElementById(`edit-date-${firestoreId}`).value,
      type:   document.getElementById(`edit-type-${firestoreId}`).value,
      blocks: readEditorBlocks(`editor-edit-${firestoreId}`)
    };
    await updateDoc(doc(db, COL, firestoreId), updated);
    Object.assign(entries[idx], updated);
    renderAll();
  };

  window.deleteEntry = async function(firestoreId) {
    if (!confirm('Delete this entry?')) return;
    await deleteDoc(doc(db, COL, firestoreId));
    entries = entries.filter(e => e.firestoreId !== firestoreId);
    renderAll();
  };

  function renderAll() {
    const container = document.getElementById('entries');
    document.getElementById('entry-count').textContent = '';
    if (entries.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = entries.map(e => renderEntry(e)).join('');
  }

  function renderBlocks(blocks) {
    if (!blocks) return '';
    return blocks.map(b => {
      if (b.type === 'text')  return `<div class="entry-block-text">${escHtml(b.content)}</div>`;
      if (b.type === 'image') return `<div class="entry-block-img"><img src="${b.dataUrl}" alt="${b.name}" onclick="openLightbox('${b.dataUrl}')" /></div>`;
      if (b.type === 'video') return `<div class="entry-block-video"><video src="${b.dataUrl}" controls></video></div>`;
      return '';
    }).join('');
  }

  function renderEntry(e) {
    const fid = e.firestoreId;
    const displayDate = e.date ? new Date(e.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    return `
      <div class="entry" id="entry-${fid}">
        <div class="entry-view">
          <p><strong>${escHtml(e.title)}</strong> &mdash; ${displayDate} &mdash; ${e.type}</p>
          ${renderBlocks(e.blocks)}
          <div class="entry-admin-actions admin-only">
            <button onclick="startEdit('${fid}')">edit</button>
            <button onclick="deleteEntry('${fid}')">delete</button>
          </div>
        </div>
        <div class="entry-edit-form">
          <p><label>Title<br><input type="text" id="edit-title-${fid}" value="${escAttr(e.title)}" style="width:100%" /></label></p>
          <p><label>Date<br><input type="date" id="edit-date-${fid}" value="${e.date}" /></label></p>
          <p><label>Type<br>
            <select id="edit-type-${fid}">
              ${['devlog','vlog','note','experiment','process'].map(t => `<option value="${t}" ${e.type===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </label></p>
          <p>Content:</p>
          <div class="editor" id="editor-edit-${fid}"></div>
          <p>
            <button onclick="addTextBlock('editor-edit-${fid}')">+ text</button>
            <button onclick="triggerMediaInsert('editor-edit-${fid}')">+ image/video</button>
          </p>
          <p><button onclick="saveEdit('${fid}')">save</button> <button onclick="cancelEdit('${fid}')">cancel</button></p>
        </div>
      </div>`;
  }

  window.startEdit = function(fid) {
    const entry = entries.find(e => e.firestoreId === fid);
    document.getElementById(`entry-${fid}`).classList.add('editing');
    buildEditor(`editor-edit-${fid}`, entry.blocks);
  };

  window.cancelEdit = function(fid) {
    document.getElementById(`entry-${fid}`).classList.remove('editing');
  };

  window.addTextBlock = function(editorId) {
    const editor = document.getElementById(editorId);
    if (!editor) return;
    const block = document.createElement('div');
    block.className = 'block';
    block.dataset.type = 'text';
    block.innerHTML = `
      <textarea placeholder="write here..."></textarea>
      <div class="block-controls">
        <button onclick="moveBlock(this,-1)">↑</button>
        <button onclick="moveBlock(this,1)">↓</button>
        <button onclick="removeBlock(this)">✕</button>
      </div>`;
    editor.appendChild(block);
    block.querySelector('textarea').focus();
  };

  window.triggerMediaInsert = function(editorId) {
    activeEditorId = editorId;
    const input = document.getElementById('media-insert-input');
    input.value = '';
    input.click();
  };

  window.handleMediaInsert = function(input) {
    Array.from(input.files).forEach(file => addMediaBlock(activeEditorId, file));
  };

  function addMediaBlock(editorId, file) {
    const reader = new FileReader();
    reader.onload = e => {
      const editor = document.getElementById(editorId);
      if (!editor) return;
      const block = document.createElement('div');
      block.className = 'block';
      block.dataset.type = file.type.startsWith('image') ? 'image' : 'video';
      block.dataset.dataUrl = e.target.result;
      block.dataset.name = file.name;
      block.dataset.mime = file.type;
      const media = file.type.startsWith('image')
        ? `<img src="${e.target.result}" style="max-width:300px" />`
        : `<video src="${e.target.result}" controls style="max-width:300px"></video>`;
      block.innerHTML = `${media}<div class="block-controls">
        <button onclick="moveBlock(this,-1)">↑</button>
        <button onclick="moveBlock(this,1)">↓</button>
        <button onclick="removeBlock(this)">✕</button>
      </div>`;
      editor.appendChild(block);
    };
    reader.readAsDataURL(file);
  }

  window.moveBlock = function(btn, dir) {
    const block = btn.closest('.block');
    const editor = block.parentElement;
    if (dir === -1 && block.previousElementSibling) editor.insertBefore(block, block.previousElementSibling);
    else if (dir === 1 && block.nextElementSibling) editor.insertBefore(block.nextElementSibling, block);
  };

  window.removeBlock = function(btn) { btn.closest('.block').remove(); };

  function readEditorBlocks(editorId) {
    const blocks = [];
    const editor = document.getElementById(editorId);
    if (!editor) return blocks;
    editor.querySelectorAll('.block').forEach(block => {
      const type = block.dataset.type;
      if (type === 'text') {
        const val = block.querySelector('textarea').value.trim();
        if (val) blocks.push({ type: 'text', content: val });
      } else {
        blocks.push({ type, dataUrl: block.dataset.dataUrl, name: block.dataset.name, mime: block.dataset.mime });
      }
    });
    return blocks;
  }

  function buildEditor(editorId, blocks) {
    const editor = document.getElementById(editorId);
    if (!editor) return;
    editor.innerHTML = '';
    if (!blocks || blocks.length === 0) { addTextBlock(editorId); return; }
    blocks.forEach(b => {
      const block = document.createElement('div');
      block.className = 'block';
      if (b.type === 'text') {
        block.dataset.type = 'text';
        block.innerHTML = `<textarea placeholder="write here...">${escHtml(b.content)}</textarea>
          <div class="block-controls">
            <button onclick="moveBlock(this,-1)">↑</button>
            <button onclick="moveBlock(this,1)">↓</button>
            <button onclick="removeBlock(this)">✕</button>
          </div>`;
      } else {
        block.dataset.type = b.type;
        block.dataset.dataUrl = b.dataUrl;
        block.dataset.name = b.name;
        block.dataset.mime = b.mime;
        const media = b.type === 'image'
          ? `<img src="${b.dataUrl}" style="max-width:300px" />`
          : `<video src="${b.dataUrl}" controls style="max-width:300px"></video>`;
        block.innerHTML = `${media}<div class="block-controls">
          <button onclick="moveBlock(this,-1)">↑</button>
          <button onclick="moveBlock(this,1)">↓</button>
          <button onclick="removeBlock(this)">✕</button>
        </div>`;
      }
      editor.appendChild(block);
    });
  }

  window.toggleForm = function() {
    document.getElementById('form-body').classList.toggle('visible');
  };

  window.openLightbox = function(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
  };
  window.closeLightbox = function() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
  };
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  function escHtml(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(str) { return (str||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
</body>
</html>
